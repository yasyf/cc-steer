name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Clone the cc-transcript sibling (unreleased v10 path dep)
        run: git clone --depth 1 https://github.com/yasyf/cc-transcript ../cc-transcript

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache-dependency-glob: uv.lock

      - name: Sync (dev + gate)
        run: uv sync --extra dev --extra gate

      - name: Type check (ty)
        run: uv run ty check cc_steer

      - name: Test (pytest)
        run: uv run pytest

      - name: Build + smoke-test wheel in a fresh venv
        run: |
          uv build
          rm -rf .wheel-smoke
          uv venv --seed .wheel-smoke
          # TEMPORARY: cc-transcript>=10 is not on PyPI yet — seed it from the
          # sibling clone so the wheel's dependencies resolve.
          uv pip install --python .wheel-smoke/bin/python ../cc-transcript
          uv pip install --python .wheel-smoke/bin/python dist/*.whl
          .wheel-smoke/bin/cc-steer --help
