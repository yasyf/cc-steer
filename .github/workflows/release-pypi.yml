name: Release (PyPI)

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-pypi
  cancel-in-progress: false

# The caller grants the ceiling the shared workflow's jobs need: contents:write
# (GitHub release) + id-token:write (OIDC trusted publishing — no API token).
permissions:
  contents: write
  id-token: write

jobs:
  release:
    uses: yasyf/homebrew-tap/.github/workflows/release-pypi.yml@pypi-v1
    secrets: inherit
    with:
      dist-name: cc-pushback
      python-version: "3.13"
