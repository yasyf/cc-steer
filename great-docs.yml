# Great Docs configuration — https://posit-dev.github.io/great-docs/
# Build: uv run great-docs build · Preview: uv run great-docs preview

module: cc_pushback
display_name: cc-pushback
parser: google
dynamic: true
repo: https://github.com/yasyf/cc-pushback
site_url: "https://yasyf.github.io/cc-pushback/"
pypi: true
github_style: widget
jupyter: python3

navbar_style: lilac
content_style: lilac
accent_color:
  light: "#e53935"
  dark: "#ef5350"
dark_mode_toggle: true
back_to_top: true
keyboard_nav: true

hero:
  name: cc-pushback
  tagline: "Your best training data is rotting in ~/.claude."
  starfield: true

cli:
  enabled: true
  module: cc_pushback.cli
  name: main

authors:
  - name: Yasyf Mohamedali
    role: Maintainer
    github: yasyf
    email: yasyfm@gmail.com

reference:
  - title: Scanning
    desc: Mine feedback events out of transcripts, incrementally.
    contents:
      - scan.scan
      - scan.ScanReport
  - title: Detection
    desc: The signal detectors and the candidate shape they emit.
    contents:
      - detectors.detect
      - models.FeedbackCandidate
      - models.dedup_key
  - title: Storage
    desc: The feedback event store.
    contents:
      - store.FeedbackStore
