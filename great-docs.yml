module: cc_pushback
display_name: cc-pushback
parser: google
dynamic: true
repo: https://github.com/yasyf/cc-pushback
site_url: "https://yasyf.github.io/cc-pushback/"
pypi: true
github_style: widget
jupyter: python3

navbar_style: lilac
content_style: lilac
accent_color:
  light: "#e53935"
  dark: "#ef5350"
dark_mode_toggle: true
back_to_top: true
keyboard_nav: true

hero:
  name: cc-pushback
  tagline: "Learn your pushback style from past Claude Code feedback and code reviews, and replicate it with a language model."
  starfield: true

# Narrative doc sections are optional — dynamic mode generates the API reference
