# Great Docs configuration — https://posit-dev.github.io/great-docs/
# Build: uv run great-docs build · Preview: uv run great-docs preview

module: cc_steer
display_name: cc-steer
parser: google
dynamic: true
repo: https://github.com/yasyf/cc-steer
site_url: "https://yasyf.github.io/cc-steer/"
pypi: true
github_style: widget
jupyter: python3

navbar_style: lilac
content_style: lilac
accent_color:
  light: "#e53935"
  dark: "#ef5350"
dark_mode_toggle: true
back_to_top: true
keyboard_nav: true

hero:
  name: cc-steer
  tagline: "Your best training data is rotting in ~/.claude."
  starfield: true

cli:
  enabled: true
  module: cc_steer.cli
  name: main

authors:
  - name: Yasyf Mohamedali
    role: Maintainer
    github: yasyf
    email: yasyfm@gmail.com

reference:
  - title: Scanning
    desc: Mine feedback events out of transcripts, incrementally.
    contents:
      - scan.scan
      - scan.ScanReport
  - title: Detection
    desc: The signal detectors and the candidate shape they emit.
    contents:
      - detectors.detect
      - models.FeedbackCandidate
      - models.dedup_key
  - title: Storage
    desc: The feedback event store.
    contents:
      - store.FeedbackStore
  - title: Retraining
    desc: The weekly retrain lanes — gate and watcher — and their promotion machinery.
    contents:
      - retrain.lexical.retrain_gate
      - retrain.watcher.retrain_watcher
      - retrain.watcher.WatcherRecipe
      - retrain.watcher.register_watcher_adapter
      - retrain.watcher.seed_incumbent_probs
      - retrain.evalset.freeze_eval
      - retrain.evalset.EvalFrame
      - retrain.promotion.corrected_gate
      - retrain.promotion.GateResult
      - retrain.promotion.Verdict
