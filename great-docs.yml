#   - title: Guide
#     dir: docs/guide
#     navbar_after: Getting Started
#     index: true

cli:
  enabled: true
  module: cc_pushback.cli
  name: main

authors:
  - name: Yasyf Mohamedali
    role: Maintainer
    github: yasyf
    email: yasyfm@gmail.com

