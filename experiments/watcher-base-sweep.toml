# Base-model sweep, one arm. Greedy keep/discard over the watcher training recipe, scored as the
# served sentinel AUC of the trained-and-served LoRA — the exact instrument the promotion pass
# gates on, minus promotion (cc_steer.retrain.sweep.score_watcher, a pure observer).
#
# ARM: qwen3-8b — the sole athome BASE_MODELS entry with serves_locally=true today, so
# cc_steer.retrain.sweep.servable_arms() yields exactly ("qwen3-8b",) and there is one arm to run.
# The recipe (watcher_recipe.json) pins this arm via its tinker_model/mlx_id. The multi-arm sweep is
# DEFERRED until athome ships a second locally-servable base; when it does, the orchestrator clones
# this spec per servable arm, swapping the recipe's base ids — no change to the machinery.
#
# Expected experiment-repo layout (relative to the repo root athome runs against):
#   watcher_recipe.json      — the mutable recipe the driver tunes
#   watcher-base-sweep.toml  — this spec, the immutable scoring boundary the candidate must not touch
#
# metric_key is "metric" to match athome.train.write_metric's channel, which score-watcher writes.
# The real run is the orchestrator's later gated call; nothing here spends on its own.

name = "watcher-base-sweep-qwen3-8b"
metric_command = ["cc-steer", "score-watcher", "--recipe", "watcher_recipe.json"]
metric_key = "metric"
direction = "max"
mutable_paths = ["watcher_recipe.json"]
immutable_paths = ["watcher-base-sweep.toml"]
hypothesis = "A tuned LoRA recipe raises the served sentinel AUC of the qwen3-8b watcher over the packaged E8 winner."

[budget]
max_units = 6
max_usd = 12.0
hard_kill_s = 5400.0
